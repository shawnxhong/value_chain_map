name: vcm

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vcm
      POSTGRES_PASSWORD: vcm
      POSTGRES_DB: vcm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcm -d vcm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
    environment:
      VCM_DATABASE_URL: postgresql+psycopg://vcm:vcm@postgres:5432/vcm
      # Passed through to the Anthropic SDK; leave blank in infra/.env to use an ant profile.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
    environment:
      VITE_API_PROXY: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
